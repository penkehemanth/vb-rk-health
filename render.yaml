services:
  - type: web
    name: rk-health-backend
    env: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && gunicorn flask_server:app
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_PHONE_NUMBER
        sync: false
      - key: GAS_URL
        sync: false
      - key: FLASK_DEBUG
        value: false
      - key: PORT
        value: 10000
